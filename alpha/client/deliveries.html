<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deliveries - EconSim</title>
    <style>
        body { background: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { margin-bottom: 20px; }
        header h1 { margin: 0; }
        nav { margin-top: 10px; }
        nav a { color: #00d4ff; margin-right: 15px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }

        .toolbar { background: #1e1e1e; padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-btn { background: #2a2a2a; border: 1px solid #444; color: #aaa; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: #003a4a; border-color: #00d4ff; color: #00d4ff; }
        #delivery-count { margin-left: auto; color: #666; font-size: 13px; }

        .deliveries-list { display: flex; flex-direction: column; gap: 8px; }

        .delivery-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px 16px; display: grid; grid-template-columns: 120px 1fr 1fr 120px 110px; gap: 12px; align-items: center; }
        .delivery-card:hover { border-color: #333; }

        .status-badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 3px; font-weight: 500; text-align: center; }
        .status-in_transit { background: #3a2a00; color: #ffa000; }
        .status-delivered { background: #1a3a1a; color: #4caf50; }
        .status-pending { background: #2a2a2a; color: #888; }

        .delivery-product { font-weight: 600; font-size: 14px; }
        .delivery-qty { font-size: 12px; color: #888; margin-top: 2px; }
        .delivery-route { font-size: 12px; }
        .delivery-route .arrow { color: #555; margin: 0 5px; }
        .delivery-route .name { color: #ddd; }
        .delivery-value { text-align: right; }
        .delivery-value .total { font-size: 14px; font-weight: 500; }
        .delivery-value .transport { font-size: 11px; color: #666; margin-top: 2px; }
        .eta-cell { text-align: right; }
        .eta-value { font-size: 14px; font-weight: 500; color: #00d4ff; }
        .eta-label { font-size: 11px; color: #666; margin-top: 2px; }
        .eta-arrived { color: #4caf50; }

        .loading { text-align: center; padding: 50px; color: #888; }

        @media (max-width: 900px) {
            .delivery-card { grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Deliveries <span style="color: #00d4ff; font-size: 14px;">EconSim ALPHA</span></h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="firms.html">Firms</a>
                <a href="cities.html">Cities</a>
                <a href="corporations.html">Corporations</a>
                <a href="products.html">Products</a>
                <a href="deliveries.html" style="color: #fff;">Deliveries</a>
                <a href="transactions.html">Transactions</a>
            </nav>
        </header>

        <div class="game-controls-bar" id="game-controls">
            <div class="game-controls-left">
                <button class="gc-btn gc-btn-play" id="gc-play" title="Resume">&#9658; Play</button>
                <button class="gc-btn gc-btn-pause" id="gc-pause" title="Pause">&#10074;&#10074; Pause</button>
                <span class="gc-separator">|</span>
                <button class="gc-btn gc-speed" data-speed="1">1x</button>
                <button class="gc-btn gc-speed" data-speed="2">2x</button>
                <button class="gc-btn gc-speed" data-speed="4">4x</button>
                <button class="gc-btn gc-speed" data-speed="8">8x</button>
                <button class="gc-btn gc-speed" data-speed="24">1D</button>
                <button class="gc-btn gc-speed" data-speed="168">1W</button>
                    <button class="gc-btn gc-speed" data-speed="720">1M</button>
                    <button class="gc-btn gc-speed" data-speed="8760">1Y</button>
            </div>
            <div class="game-controls-right">
                <span id="delivery-count">-- deliveries</span>
                <span class="gc-status gc-status-paused" id="gc-status">
                    <span class="gc-status-indicator gc-indicator-paused" id="gc-indicator"></span>
                    <span id="gc-status-text">Paused</span>
                </span>
                <span class="gc-clock" id="gc-clock">--</span>
            </div>
        </div>

        <div class="toolbar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="in_transit">In Transit</button>
            <button class="filter-btn" data-filter="delivered">Delivered</button>
        </div>

        <div id="deliveries-container" class="deliveries-list">
            <div class="loading">Connecting to server...</div>
        </div>
    </div>

    <script type="module">
        import { wsClient } from './js/WebSocketClient.js';
        import { stateManager } from './js/StateManager.js';
        import { setupGameControls, injectControlStyles } from './js/GameControls.js';

        stateManager.init(wsClient);
        injectControlStyles();

        const container = document.getElementById('deliveries-container');
        const countEl = document.getElementById('delivery-count');

        let currentFilter = 'all';
        let currentDeliveries = [];
        let currentTotalHours = 0;

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderDeliveries(currentDeliveries, currentTotalHours);
            });
        });

        function fmt$(n) {
            if (n == null || isNaN(n)) return '$0';
            if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
            return '$' + Math.floor(n).toLocaleString();
        }

        function fmtNum(n) {
            if (n == null || isNaN(n)) return '0';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return Math.floor(n).toLocaleString();
        }

        function formatEta(arrivalHour, totalHours, status) {
            if (status === 'delivered') return { value: 'Delivered', label: '', arrived: true };
            const remaining = arrivalHour - totalHours;
            if (remaining <= 0) return { value: 'Arriving', label: 'this tick', arrived: true };
            const days = Math.floor(remaining / 24);
            const hours = Math.floor(remaining % 24);
            if (days > 0) return { value: `${days}d ${hours}h`, label: 'remaining' };
            return { value: `${hours}h`, label: 'remaining' };
        }

        function renderDeliveries(deliveries, totalHours) {
            const filtered = currentFilter === 'all'
                ? deliveries
                : deliveries.filter(d => d.status === currentFilter);

            countEl.textContent = filtered.length + ' deliveries';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No deliveries' + (currentFilter !== 'all' ? ' with status: ' + currentFilter : '') + '</div>';
                return;
            }

            container.innerHTML = filtered.map(d => {
                const eta = formatEta(d.arrivalHour, totalHours, d.status);
                const total = d.totalCost || (d.quantity * (d.unitPrice || 0));
                return `
                    <div class="delivery-card">
                        <div>
                            <span class="status-badge status-${d.status || 'pending'}">${d.status || 'pending'}</span>
                        </div>
                        <div>
                            <div class="delivery-product">${d.productName || d.product || '—'}</div>
                            <div class="delivery-qty">${fmtNum(d.quantity)} units · q: ${((d.quality || 1) * 100).toFixed(0)}%</div>
                        </div>
                        <div class="delivery-route">
                            <div>
                                <span class="name">${d.supplierName || d.supplierId || '—'}</span>
                                <span class="arrow">→</span>
                                <span class="name">${d.buyerName || d.buyerId || '—'}</span>
                            </div>
                            ${d.contractId ? `<div style="font-size:10px;color:#555;margin-top:3px">Contract: ${d.contractId.slice(-8)}</div>` : ''}
                        </div>
                        <div class="delivery-value">
                            <div class="total">${fmt$(total)}</div>
                            <div class="transport">+${fmt$(d.transportCost || 0)} transport</div>
                        </div>
                        <div class="eta-cell">
                            <div class="eta-value ${eta.arrived ? 'eta-arrived' : ''}">${eta.value}</div>
                            <div class="eta-label">${eta.label}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let _renderTimer = null;
        stateManager.subscribeAll((state, changedKeys) => {
            currentTotalHours = state.totalHours || 0;
            if (changedKeys.includes('pendingDeliveries') || changedKeys.includes('totalHours')) {
                currentDeliveries = Array.isArray(state.pendingDeliveries) ? state.pendingDeliveries : [];
                clearTimeout(_renderTimer);
                _renderTimer = setTimeout(() => renderDeliveries(currentDeliveries, currentTotalHours), 300);
            }
        });

        async function init() {
            const sessionId = sessionStorage.getItem('activeSessionId');
            if (!sessionId) {
                container.innerHTML = '<div class="loading">No active session. <a href="index.html" style="color: #00d4ff;">Go to Dashboard</a></div>';
                return;
            }
            try {
                await wsClient.connect();
                setupGameControls(wsClient, stateManager);
                await fetch('/api/v1/games/' + sessionId + '/load', { method: 'POST' });
                await wsClient.joinSession(sessionId);
                container.innerHTML = '<div class="loading">Loading deliveries...</div>';
            } catch (e) {
                console.error('Error:', e);
                container.innerHTML = '<div class="loading">Error connecting. <a href="index.html" style="color: #00d4ff;">Go to Dashboard</a></div>';
            }
        }

        init();
    </script>
</body>
</html>
