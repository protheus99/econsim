<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firm Details - EconSim</title>
    <style>
        body { background: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        header { margin-bottom: 20px; }
        header h1 { margin: 0; }
        nav { margin-top: 10px; }
        nav a { color: #00d4ff; margin-right: 15px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .back-link { color: #00d4ff; text-decoration: none; margin-bottom: 15px; display: inline-block; font-size: 13px; }
        .back-link:hover { text-decoration: underline; }

        /* Hero header */
        .firm-hero { background: #1e1e1e; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; border: 1px solid #333; }
        .firm-hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .firm-hero-name { font-size: 24px; font-weight: 700; margin: 0 0 4px; }
        .firm-hero-sub { font-size: 13px; color: #888; }
        .firm-hero-sub .city { color: #00d4ff; }
        .firm-hero-sub .corp { color: #aaa; margin-left: 8px; }
        .type-badge { background: #1a2a3a; color: #42a5f5; font-size: 12px; padding: 4px 12px; border-radius: 4px; white-space: nowrap; }

        /* KPI row */
        .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; margin-top: 16px; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .kpi-cell { padding: 12px 14px; border-right: 1px solid #333; }
        .kpi-cell:last-child { border-right: none; }
        .kpi-label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .kpi-value { font-size: 18px; font-weight: 600; color: #ddd; }
        .kpi-value.positive { color: #4caf50; }
        .kpi-value.negative { color: #f44336; }

        /* Two-column layout */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .kpi-row { grid-template-columns: repeat(3,1fr); } }

        /* Section cards */
        .section { background: #1e1e1e; border-radius: 8px; padding: 16px 18px; border: 1px solid #333; margin-bottom: 16px; }
        .section-title { font-size: 12px; font-weight: 600; color: #00d4ff; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 12px; }

        /* Info rows */
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; }
        .info-value { color: #ddd; font-weight: 500; text-align: right; }
        .info-value.positive { color: #4caf50; }
        .info-value.negative { color: #f44336; }

        /* Production lines table */
        .prod-table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .prod-table th { color: #666; font-size: 10px; text-transform: uppercase; padding: 4px 6px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        .prod-table td { padding: 6px 6px; border-bottom: 1px solid #1a1a1a; color: #ddd; }
        .prod-table tr:last-child td { border-bottom: none; }

        /* Status badges */
        .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
        .badge-active { background: #1a3a1a; color: #4caf50; }
        .badge-idle { background: #2a2a2a; color: #888; }
        .badge-switching { background: #3a2a00; color: #ffa000; }
        .badge-available { background: #1a2a3a; color: #42a5f5; }
        .badge-reserved { background: #2a1a3a; color: #ab47bc; }

        /* Production health */
        .health-badges { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0 4px; }
        .health-badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; }
        .health-badge-warn { background: #3a2a00; color: #ffa000; }
        .health-badge-danger { background: #3a1a1a; color: #f44336; }
        .badge-expired { background: #3a1a1a; color: #ef5350; }


        /* Progress bar */
        .progress-bar { background: #2a2a2a; border-radius: 3px; height: 6px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .fill-blue { background: #00d4ff; }
        .fill-green { background: #4caf50; }
        .fill-orange { background: #ffa000; }
        .fill-red { background: #f44336; }

        /* Lot progress */
        .lot-progress { background: #161616; border-radius: 6px; padding: 12px 14px; }
        .lot-progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .lot-progress-title { font-size: 12px; color: #aaa; }
        .lot-progress-pct { font-size: 13px; font-weight: 600; color: #00d4ff; }
        .lot-progress-bar { background: #2a2a2a; border-radius: 4px; height: 10px; overflow: hidden; }
        .lot-progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #00d4ff, #42a5f5); transition: width 0.5s ease; }
        .lot-progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: #666; }
        .lot-eta { color: #ffa000; font-weight: 500; }
        .lot-rate { color: #888; }
        .lot-buffer { color: #aaa; }
        .production-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
        .prod-option { background: #2a2a2a; border-radius: 4px; padding: 8px 10px; text-align: center; }
        .prod-option-label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 3px; }
        .prod-option-value { font-size: 13px; color: #ddd; font-weight: 500; }
        .prod-option-value.highlight { color: #00d4ff; }

        /* Retail inventory */
        .retail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
        .retail-item { background: #2a2a2a; border-radius: 4px; padding: 8px 10px; font-size: 12px; }
        .retail-item-name { color: #aaa; margin-bottom: 4px; font-size: 11px; }
        .retail-item-qty { color: #a5d6a7; font-size: 14px; font-weight: 600; }
        .retail-item-price { color: #888; font-size: 10px; margin-top: 2px; }

        .loading { text-align: center; padding: 50px; color: #888; }
        .error { color: #f44336; }
        .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #2a2a2a; color: #aaa; margin-right: 4px; }
        .tag.green { background: #1a3a1a; color: #4caf50; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Firm Details <span style="color: #00d4ff; font-size: 14px;">EconSim ALPHA</span></h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="firms.html">Firms</a>
                <a href="cities.html">Cities</a>
                <a href="corporations.html">Corporations</a>
                <a href="products.html">Products</a>
                <a href="deliveries.html">Deliveries</a>
                <a href="transactions.html">Transactions</a>
            </nav>
        </header>

        <a href="firms.html" class="back-link">&larr; Back to Firms</a>

        <div class="game-controls-bar" id="game-controls">
            <div class="game-controls-left">
                <button class="gc-btn gc-btn-play" id="gc-play" title="Resume">&#9658; Play</button>
                <button class="gc-btn gc-btn-pause" id="gc-pause" title="Pause">&#10074;&#10074; Pause</button>
                <span class="gc-separator">|</span>
                <button class="gc-btn gc-speed" data-speed="1">1x</button>
                <button class="gc-btn gc-speed" data-speed="2">2x</button>
                <button class="gc-btn gc-speed" data-speed="4">4x</button>
                <button class="gc-btn gc-speed" data-speed="8">8x</button>
                <button class="gc-btn gc-speed" data-speed="24">1D</button>
                <button class="gc-btn gc-speed" data-speed="168">1W</button>
                    <button class="gc-btn gc-speed" data-speed="720">1M</button>
                    <button class="gc-btn gc-speed" data-speed="8760">1Y</button>
            </div>
            <div class="game-controls-right">
                <span class="gc-status gc-status-paused" id="gc-status">
                    <span class="gc-status-indicator gc-indicator-paused" id="gc-indicator"></span>
                    <span id="gc-status-text">Paused</span>
                </span>
                <span class="gc-clock" id="gc-clock">--</span>
            </div>
        </div>

        <div id="content">
            <div class="loading">Loading firm details...</div>
        </div>
    </div>

    <script type="module">
        import { wsClient } from './js/WebSocketClient.js';
        import { stateManager } from './js/StateManager.js';
        import { setupGameControls, injectControlStyles } from './js/GameControls.js';

        stateManager.init(wsClient);
        injectControlStyles();

        const content = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const firmId = urlParams.get('id');

        // ─── Formatters ────────────────────────────────────────────────────────────

        function fmt$(num) {
            if (num == null || isNaN(num)) return '$0';
            const abs = Math.abs(num);
            const sign = num < 0 ? '-' : '';
            if (abs >= 1e9) return sign + '$' + (abs / 1e9).toFixed(2) + 'B';
            if (abs >= 1e6) return sign + '$' + (abs / 1e6).toFixed(2) + 'M';
            if (abs >= 1e3) return sign + '$' + (abs / 1e3).toFixed(1) + 'K';
            return sign + '$' + Math.floor(abs).toLocaleString();
        }

        function fmtNum(num) {
            if (num == null || isNaN(num)) return '0';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toLocaleString();
        }

        function pct(val, decimals = 0) {
            if (val == null) return '—';
            return (val * 100).toFixed(decimals) + '%';
        }

        function profitClass(val) {
            return (val || 0) >= 0 ? 'positive' : 'negative';
        }

        function typeName(firm) {
            switch (firm.type) {
                case 'MINING': return `Mining — ${firm.resourceType || '?'}`;
                case 'LOGGING': return `Logging — ${firm.timberType || '?'}`;
                case 'FARM': return firm.farmType === 'CROP'
                    ? `Crop Farm — ${firm.cropType || '?'}`
                    : `Livestock — ${firm.livestockType || '?'}`;
                case 'MANUFACTURING': return `Manufacturing`;
                case 'RETAIL': return `Retail — ${firm.storeType || '?'}`;
                case 'BANK': return `Bank — ${firm.bankType || '?'}`;
                default: return firm.type || 'Unknown';
            }
        }

        // ─── Section builders ──────────────────────────────────────────────────────

        function sectionHtml(title, body) {
            return `<div class="section"><div class="section-title">${title}</div>${body}</div>`;
        }

        function infoRow(label, value, cls = '') {
            return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value ${cls}">${value}</span></div>`;
        }

        function progressBar(fraction, colorClass = 'fill-blue') {
            const pctVal = Math.min(100, Math.max(0, (fraction || 0) * 100)).toFixed(0);
            return `<div class="progress-bar"><div class="progress-fill ${colorClass}" style="width:${pctVal}%"></div></div>`;
        }

        function renderFinancials(firm) {
            const mp = firm.monthlyProfit || 0;
            const rows = [
                infoRow('Monthly Revenue', fmt$(firm.monthlyRevenue || 0)),
                infoRow('Monthly Expenses', fmt$(firm.monthlyExpenses || 0)),
                infoRow('Monthly Profit', fmt$(mp), profitClass(mp)),
                infoRow('Total Revenue', fmt$(firm.revenue || 0)),
                infoRow('Total Expenses', fmt$(firm.expenses || 0)),
                infoRow('Total Profit', fmt$(firm.profit || 0), profitClass(firm.profit)),
                infoRow('Total Assets', fmt$(firm.totalAssets || 0)),
                infoRow('Total Liabilities', fmt$(firm.totalLiabilities || 0)),
                infoRow('Brand Rating', `${(firm.brandRating || 0).toFixed(0)} / 100`),
                infoRow('Technology Level', firm.technologyLevel || 1),
                infoRow('Efficiency', pct(firm.efficiency, 0)),
            ];
            return sectionHtml('Financials', rows.join(''));
        }

        function renderLabor(firm) {
            const employees = firm.totalEmployees || firm.employees || 0;
            const laborCost = firm.totalLaborCost || 0;
            const rows = [
                infoRow('Total Employees', fmtNum(employees)),
                infoRow('Monthly Labor Cost', fmt$(laborCost)),
                laborCost && employees ? infoRow('Avg Wage / Employee', fmt$(laborCost / employees)) : '',
            ].filter(Boolean);
            return sectionHtml('Labor', rows.join(''));
        }

        function renderMining(firm) {
            const inv = firm.inventory || {};
            const reserves = firm.remainingReserves;
            const maxReserves = reserves != null ? Math.max(reserves, 1) : null;
            const rows = [
                infoRow('Resource Type', firm.resourceType || '—'),
                infoRow('Remaining Reserves', fmtNum(reserves)),
                infoRow('Reserve Quality', (firm.reserveQuality || 0).toFixed(0)),
                infoRow('Depletion Rate', (firm.depletionRate || 0).toFixed(2) + '%'),
                infoRow('Equipment Efficiency', pct(firm.equipmentEfficiency, 1)),
                infoRow('Equipment Degradation', (firm.equipmentDegradation || 0).toFixed(1) + '%'),
                infoRow('Accumulated Production', fmtNum(firm.accumulatedProduction) + ' t'),
                infoRow('Current Inventory', fmtNum(inv.quantity || 0) + ' t'),
                infoRow('Inventory Quality', pct(inv.quality, 0)),
            ];
            return sectionHtml('Mining Operations', rows.join(''));
        }

        function renderLogging(firm) {
            const inv = firm.inventory || {};
            const rows = [
                infoRow('Timber Type', firm.timberType || '—'),
                infoRow('Forest Size', fmtNum(firm.forestSize) + ' ha'),
                infoRow('Forest Density', pct(firm.forestDensity, 0)),
                infoRow('Forest Health', pct(firm.forestHealth, 1)),
                infoRow('Average Tree Age', (firm.averageTreeAge || 0).toFixed(1) + ' yrs'),
                infoRow('Certified Sustainable', firm.certifiedSustainable ? '<span class="tag green">Yes</span>' : 'No'),
                infoRow('Equipment Efficiency', pct(firm.equipmentEfficiency, 1)),
                infoRow('Accumulated Production', fmtNum(firm.accumulatedProduction) + ' t'),
                infoRow('Current Inventory', fmtNum(inv.quantity || 0) + ' t'),
                infoRow('Inventory Quality', pct(inv.quality, 0)),
            ];
            return sectionHtml('Logging Operations', rows.join(''));
        }

        function renderFarm(firm) {
            const inv = firm.inventory || {};
            let typeRows = '';
            if (firm.farmType === 'CROP') {
                typeRows = [
                    infoRow('Crop Type', firm.cropType || '—'),
                    infoRow('Growth Stage', firm.currentGrowthStage || '—'),
                    infoRow('Soil Quality', pct(firm.soilQuality, 1)),
                    infoRow('Yield / Hectare', fmtNum(firm.yieldPerHectare)),
                    infoRow('Irrigation Level', pct(firm.irrigationLevel, 0)),
                ].join('');
            } else {
                typeRows = [
                    infoRow('Livestock Type', firm.livestockType || '—'),
                    infoRow('Herd Size', fmtNum(firm.herdSize)),
                    infoRow('Current Maturity', pct(firm.currentMaturity, 1)),
                    infoRow('Feeding Rate', (firm.feedingRate || 0).toFixed(2)),
                ].join('');
            }
            const commonRows = [
                infoRow('Land Size', fmtNum(firm.landSize) + ' ha'),
                infoRow('Accumulated Production', fmtNum(firm.accumulatedProduction)),
                infoRow('Current Inventory', fmtNum(inv.quantity || 0)),
                infoRow('Inventory Quality', pct(inv.quality, 0)),
            ].join('');
            return sectionHtml('Farm Operations', typeRows + commonRows);
        }

        function renderManufacturing(firm) {
            const lines = firm.productionLines || [];
            const eff = firm.productionEfficiency;
            const defects = firm.defectRate;
            const fg = firm.finishedGoodsInventory || {};
            const rawMat = firm.rawMaterialInventory || {};

            const statsRows = [
                infoRow('Production Efficiency', pct(eff, 1)),
                infoRow('Defect Rate', pct(defects, 2)),
                infoRow('Quality Control', pct(firm.qualityControl, 1)),
                infoRow('Downtime', pct(firm.downtimePercentage, 1)),
                infoRow('Shifts', firm.shiftConfig ? `${firm.shiftConfig.shiftCount} × ${firm.shiftConfig.hoursPerShift}h` : '—'),
                infoRow('Effective Hours/Day', firm.effectiveHoursPerDay != null ? firm.effectiveHoursPerDay + 'h' : '—'),
                infoRow('Accumulated Output', fmtNum(firm.accumulatedProduction)),
                infoRow('Finished Goods', `${fmtNum(fg.quantity || 0)} units (q: ${pct(fg.quality, 0)})`),
            ].join('');

            const linesHtml = lines.length > 0
                ? `<table class="prod-table">
                    <thead><tr><th>Product</th><th>Output/hr</th><th>Base Rate</th><th>Status</th></tr></thead>
                    <tbody>${lines.map(l => {
                        const sc = l.status === 'active' ? 'badge-active' : l.status === 'switching' ? 'badge-switching' : 'badge-idle';
                        return `<tr>
                            <td>${l.productName || l.productId || '—'}</td>
                            <td>${fmtNum(l.outputPerHour || 0)}</td>
                            <td>${fmtNum(l.baseProductionRate || 0)}</td>
                            <td><span class="badge ${sc}">${l.status || 'idle'}</span></td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>`
                : '<div style="font-size:12px;color:#555">No production lines</div>';

            const rawEntries = Object.entries(rawMat);
            const rawHtml = rawEntries.length > 0
                ? `<table class="prod-table">
                    <thead><tr><th>Material</th><th>Quantity</th><th>Avg Quality</th></tr></thead>
                    <tbody>${rawEntries.map(([mat, data]) =>
                        `<tr><td>${mat}</td><td>${fmtNum(data.quantity || 0)}</td><td>${pct(data.avgQuality, 0)}</td></tr>`
                    ).join('')}</tbody>
                </table>`
                : '<div style="font-size:12px;color:#555">No raw materials</div>';

            return sectionHtml('Manufacturing Stats', statsRows)
                + sectionHtml(`Production Lines (${lines.length})`, linesHtml)
                + sectionHtml('Raw Material Inventory', rawHtml);
        }

        function renderRetail(firm) {
            const inv = firm.inventoryData || {};
            const entries = Object.values(inv);

            const statsRows = [
                infoRow('Store Type', firm.storeType || '—'),
                infoRow('Store Size', fmtNum(firm.storeSize) + ' m²'),
                infoRow('Customer Satisfaction', pct(firm.customerSatisfaction, 1)),
                infoRow('Foot Traffic (current)', fmtNum(firm.footTraffic)),
                infoRow('Foot Traffic (last day)', fmtNum(firm.lastDayFootTraffic)),
                infoRow('Total Units Ordered', fmtNum(firm.totalUnitsOrdered)),
                infoRow('Total Units Sold', fmtNum(firm.totalUnitsSold)),
                infoRow('Total Sales Count', fmtNum(firm.totalSalesCount)),
            ].join('');

            const invHtml = entries.length > 0
                ? `<div class="retail-grid">${entries.map(item => `
                    <div class="retail-item">
                        <div class="retail-item-name">${item.productName || '?'}</div>
                        <div class="retail-item-qty">${fmtNum(item.quantity || 0)} units</div>
                        <div class="retail-item-price">Retail: ${fmt$(item.retailPrice)} | Wholesale: ${fmt$(item.wholesalePrice)}</div>
                    </div>`).join('')}</div>`
                : '<div style="font-size:12px;color:#555">No inventory data</div>';

            return sectionHtml('Store Performance', statsRows)
                + sectionHtml(`Stock (${entries.length} products)`, invHtml);
        }

        function renderBank(firm) {
            const rows = [
                infoRow('Bank Type', firm.bankType || '—'),
                infoRow('Total Assets', fmt$(firm.totalAssets || 0)),
                infoRow('Total Liabilities', fmt$(firm.totalLiabilities || 0)),
                infoRow('Active Loans', (firm.loans || []).length),
                infoRow('Brand Rating', (firm.brandRating || 0).toFixed(0) + ' / 100'),
            ].join('');
            return sectionHtml('Bank Operations', rows);
        }

        function renderTypeSection(firm) {
            switch (firm.type) {
                case 'MINING': return renderMining(firm);
                case 'LOGGING': return renderLogging(firm);
                case 'FARM': return renderFarm(firm);
                case 'MANUFACTURING': return renderManufacturing(firm);
                case 'RETAIL': return renderRetail(firm);
                case 'BANK': return renderBank(firm);
                default: return '';
            }
        }

        function renderLotProgress(firm) {
            // Only for lot-producing firms (Mining, Logging, Farm)
            if (!['MINING', 'LOGGING', 'FARM'].includes(firm.type)) return '';
            if (firm.lotSize == null) return '';

            const accumulated = firm.accumulatedProduction || 0;
            const lotSize = firm.lotSize;
            const rate = firm.productionRate || 0; // units per hour

            const fraction = Math.min(1, accumulated / lotSize);
            const pctVal = (fraction * 100).toFixed(1);
            const remaining = lotSize - accumulated;

            // ETA calculations
            const hoursToNext = rate > 0 ? remaining / rate : null;
            const minutesToNext = hoursToNext != null ? hoursToNext * 60 : null;

            function fmtEta(hours) {
                if (hours == null || !isFinite(hours)) return '—';
                const d = hours / 24;
                return d < 1 ? d.toFixed(2) + ' days' : d.toFixed(1) + ' days';
            }

            const lotsPerDay = rate > 0 ? (rate * 24) / lotSize : 0;
            const lotsPerWeek = lotsPerDay * 7;
            const lotsPerMonth = lotsPerDay * 30;

            // Color: blue normally, orange if almost done, green when ready
            const fillColor = fraction >= 0.9 ? '#4caf50' : fraction >= 0.5 ? '#00d4ff' : '#00d4ff';
            const barStyle = `width:${(fraction * 100).toFixed(1)}%;background:${fillColor}`;

            const productLabel = firm.resourceType || firm.timberType || firm.cropType || firm.livestockType || 'Product';

            return sectionHtml('Next Lot Progress', `
                <div class="lot-progress">
                    <div class="lot-progress-header">
                        <span class="lot-progress-title">${productLabel} — ${fmtNum(accumulated)} / ${fmtNum(lotSize)} units</span>
                        <span class="lot-progress-pct">${pctVal}%</span>
                    </div>
                    <div class="lot-progress-bar">
                        <div class="lot-progress-fill" style="${barStyle}"></div>
                    </div>
                    <div class="lot-progress-meta">
                        <span class="lot-buffer">Buffer: ${fmtNum(accumulated)} / ${fmtNum(lotSize)}</span>
                        <span class="lot-rate">Rate: ${fmtNum(rate)}/hr</span>
                        <span class="lot-eta">ETA: ${fmtEta(hoursToNext)}</span>
                    </div>
                </div>
                <div class="production-options" style="margin-top:10px">
                    <div class="prod-option">
                        <div class="prod-option-label">Lots / Day</div>
                        <div class="prod-option-value ${lotsPerDay >= 1 ? 'highlight' : ''}">${lotsPerDay >= 0.1 ? lotsPerDay.toFixed(2) : '<1'}</div>
                    </div>
                    <div class="prod-option">
                        <div class="prod-option-label">Lots / Week</div>
                        <div class="prod-option-value">${lotsPerWeek.toFixed(1)}</div>
                    </div>
                    <div class="prod-option">
                        <div class="prod-option-label">Lots / Month</div>
                        <div class="prod-option-value">${lotsPerMonth.toFixed(1)}</div>
                    </div>
                </div>
            `);
        }

        function renderLotInventory(firm) {
            if (!firm.lotInventory) return '';
            const lots = firm.lotInventory.lots || [];
            if (lots.length === 0) return '';

            const capacity = firm.lotInventory.storageCapacity || 0;

            // Aggregate by product
            const byProduct = {};
            lots.forEach(lot => {
                const key = lot.productName || 'Unknown';
                if (!byProduct[key]) byProduct[key] = { total: 0, count: 0, qualitySum: 0, available: 0, reserved: 0, expired: 0 };
                const g = byProduct[key];
                g.total      += lot.quantity || 0;
                const q = lot.quality != null && lot.quality <= 1 ? lot.quality : (lot.quality || 0) / 100;
                g.qualitySum += q * (lot.quantity || 0);
                g.count++;
                if      (lot.status === 'AVAILABLE') g.available += lot.quantity || 0;
                else if (lot.status === 'RESERVED')  g.reserved  += lot.quantity || 0;
                else if (lot.status === 'EXPIRED')   g.expired   += lot.quantity || 0;
            });

            const rows = Object.entries(byProduct).map(([name, g]) => {
                const avgQuality = g.total > 0 ? g.qualitySum / g.total : 0;
                const qColor = avgQuality >= 0.8 ? '#4caf50' : avgQuality >= 0.5 ? '#ffa000' : '#f44336';
                const fillPct = capacity > 0 ? Math.min(100, (g.count / capacity) * 100) : 0;
                const statusParts = [
                    g.available ? `<span style="color:#4caf50">${fmtNum(g.available)} avail</span>` : '',
                    g.reserved  ? `<span style="color:#ffa000">${fmtNum(g.reserved)} rsv</span>`   : '',
                    g.expired   ? `<span style="color:#f44336">${fmtNum(g.expired)} exp</span>`    : ''
                ].filter(Boolean).join('&nbsp; ');

                return `
                <div style="padding:10px 0;border-bottom:1px solid #1e1e1e">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
                        <span style="font-weight:600;color:#ddd">${name}</span>
                        <span style="font-size:12px;color:#888">${g.count} lot${g.count !== 1 ? 's' : ''}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:16px">
                        <div style="flex:1">
                            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
                                <span>${statusParts || `<span style="color:#aaa">${fmtNum(g.total)}</span>`}</span>
                                <span style="color:#aaa">${fmtNum(g.total)} total</span>
                            </div>
                            ${capacity > 0 ? `
                            <div style="background:#2a2a2a;border-radius:3px;height:5px;overflow:hidden">
                                <div style="height:100%;width:${fillPct.toFixed(1)}%;background:#00d4ff;border-radius:3px"></div>
                            </div>` : ''}
                        </div>
                        <div style="text-align:right;min-width:60px">
                            <div style="font-size:13px;font-weight:600;color:${qColor}">${pct(avgQuality, 0)}</div>
                            <div style="font-size:10px;color:#555">avg quality</div>
                        </div>
                    </div>
                </div>`;
            }).join('');

            const capacityLine = capacity > 0
                ? `<div style="font-size:11px;color:#555;margin-top:8px;text-align:right">${lots.length} / ${capacity} lots &nbsp;(${Math.round(lots.length / capacity * 100)}% full)</div>`
                : '';

            return sectionHtml(`Lot Inventory — ${lots.length} lot${lots.length !== 1 ? 's' : ''}`, rows + capacityLine);
        }

        function renderLoans(firm) {
            if (!firm.loans || firm.loans.length === 0) return '';
            const tableHtml = `
                <table class="prod-table">
                    <thead><tr><th>Principal</th><th>Remaining</th><th>Rate</th><th>Mo. Payment</th><th>Status</th></tr></thead>
                    <tbody>${firm.loans.map(loan => `
                        <tr>
                            <td>${fmt$(loan.principal || loan.amount || 0)}</td>
                            <td>${fmt$(loan.remainingBalance || 0)}</td>
                            <td>${((loan.interestRate || 0) * 100).toFixed(1)}%</td>
                            <td>${fmt$(loan.monthlyPayment || 0)}</td>
                            <td><span class="badge badge-available">${loan.status || 'active'}</span></td>
                        </tr>`).join('')}
                    </tbody>
                </table>`;
            return sectionHtml(`Loans (${firm.loans.length})`, tableHtml);
        }

        function renderHistory(firm) {
            const h = firm.monthlyHistory;
            if (!h || h.length < 1) return '';
            const rows = [...h].reverse().map(s => {
                const pc = s.profit >= 0 ? '#4caf50' : '#f44336';
                return `<tr>
                    <td>Mo ${s.month}, Yr ${s.year}</td>
                    <td>${fmt$(s.revenue)}</td>
                    <td>${fmt$(s.expenses)}</td>
                    <td style="color:${pc};font-weight:600">${fmt$(s.profit)}</td>
                    <td>${fmt$(s.cash)}</td>
                    <td>${fmtNum(s.employees)}</td>
                </tr>`;
            }).join('');
            const tableHtml = `<table class="prod-table">
                <thead><tr><th>Period</th><th>Revenue</th><th>Expenses</th><th>Profit</th><th>Cash</th><th>Employees</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
            return sectionHtml(`Performance History (${h.length} months)`, tableHtml);
        }

        // ─── Firm transaction history ──────────────────────────────────────────────

        const CAT_LABELS = { B2B_RAW:'Raw', B2B_SEMI:'Semi', B2B_MANUFACTURED:'Mfg', B2B_WHOLESALE:'Wholesale', B2C_RETAIL:'Retail', CONTRACT:'Contract' };

        function renderFirmTransactions(firm, allTransactions) {
            if (!allTransactions || allTransactions.length === 0) return '';
            const firmTxs = allTransactions
                .filter(tx => tx.sellerId === firm.id || tx.buyerId === firm.id)
                .slice(0, 20);
            if (firmTxs.length === 0) return '';

            const rows = firmTxs.map(tx => {
                const isSeller = tx.sellerId === firm.id;
                const dir = isSeller
                    ? '<span style="color:#4caf50;font-size:10px">SOLD</span>'
                    : '<span style="color:#42a5f5;font-size:10px">BOUGHT</span>';
                const cat = tx.category || '';
                const catLabel = CAT_LABELS[cat] || cat;
                const counterparty = isSeller
                    ? (tx.buyerName || tx.buyerId || '—')
                    : (tx.sellerName || tx.sellerId || '—');
                const total = tx.totalValue || (tx.quantity * (tx.unitPrice || 0));
                return `<tr>
                    <td>${dir}</td>
                    <td><strong>${tx.productName || '—'}</strong></td>
                    <td style="text-align:right;color:#aaa">${Math.floor(tx.quantity || 0).toLocaleString()}</td>
                    <td style="text-align:right;font-weight:500">${fmt$(total)}</td>
                    <td style="color:#888;font-size:11px">${counterparty}</td>
                    <td><span style="font-size:10px;padding:1px 5px;border-radius:3px;background:#2a2a2a;color:#888">${catLabel}</span></td>
                    <td style="color:#555;font-size:11px">${tx.gameTime || '—'}</td>
                </tr>`;
            }).join('');

            return `<div class="section">
                <div class="section-title">Recent Transactions (${firmTxs.length})</div>
                <table style="width:100%;border-collapse:collapse;font-size:12px">
                    <thead>
                        <tr style="color:#555;font-size:10px;text-transform:uppercase">
                            <th style="padding:4px 6px;text-align:left;border-bottom:1px solid #2a2a2a">Dir</th>
                            <th style="padding:4px 6px;text-align:left;border-bottom:1px solid #2a2a2a">Product</th>
                            <th style="padding:4px 6px;text-align:right;border-bottom:1px solid #2a2a2a">Qty</th>
                            <th style="padding:4px 6px;text-align:right;border-bottom:1px solid #2a2a2a">Total</th>
                            <th style="padding:4px 6px;text-align:left;border-bottom:1px solid #2a2a2a">Counterparty</th>
                            <th style="padding:4px 6px;text-align:left;border-bottom:1px solid #2a2a2a">Type</th>
                            <th style="padding:4px 6px;text-align:left;border-bottom:1px solid #2a2a2a">Time</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }

        // ─── Production health badges ──────────────────────────────────────────────

        function renderProductionHealth(firm) {
            const badges = [];
            if ((firm.noSaleStreak || 0) > 0) {
                const cls = firm.noSaleStreak >= 3 ? 'health-badge-danger' : 'health-badge-warn';
                badges.push(`<span class="health-badge ${cls}">No sales: ${firm.noSaleStreak} mo</span>`);
            }
            if ((firm.consecutiveThrottleCycles || 0) > 2) {
                const reason = firm.lastThrottleReason || 'unknown';
                const label = reason === 'storage_full' ? 'Storage full' : reason === 'excess_inventory' ? 'Excess stock' : 'No contracts';
                badges.push(`<span class="health-badge health-badge-warn">Throttled: ${label} (${firm.consecutiveThrottleCycles})</span>`);
            }
            if (badges.length === 0) return '';
            return `<div class="section"><div class="section-title">Production Health</div><div class="health-badges">${badges.join('')}</div></div>`;
        }

        // ─── Contracts ─────────────────────────────────────────────────────────────

        function renderContracts(firm, allContracts) {
            if (!allContracts || allContracts.length === 0) return '';
            const firmContracts = allContracts.filter(c =>
                c.supplierId === firm.id || c.buyerId === firm.id
            );
            if (firmContracts.length === 0) return '';

            const statusColor = { ACTIVE: '#4caf50', PENDING: '#ffa000', TERMINATED: '#f44336', SUSPENDED: '#888' };
            const statusBg    = { ACTIVE: '#1a3a1a', PENDING: '#3a2a00', TERMINATED: '#3a1a1a', SUSPENDED: '#2a2a2a' };

            const cards = firmContracts.map(c => {
                const isSeller = c.supplierId === firm.id;
                const role = isSeller
                    ? `<span style="color:#4caf50;font-weight:600">SELLING</span>`
                    : `<span style="color:#42a5f5;font-weight:600">BUYING</span>`;
                const counterparty = isSeller
                    ? (c.buyerName || c.buyerId || '—')
                    : (c.supplierName || c.supplierId || '—');
                const st = (c.status || 'ACTIVE').toUpperCase();
                const stColor = statusColor[st] || '#aaa';
                const stBg    = statusBg[st]    || '#2a2a2a';

                // Fulfillment history: last 5 deliveries
                const history = (c.fulfillmentHistory || []).slice(-5).reverse();
                const histRows = history.map(d => {
                    const fr = ((d.fulfillmentRate || 0) * 100).toFixed(0);
                    const frColor = d.fulfillmentRate >= 0.9 ? '#4caf50' : d.fulfillmentRate >= 0.5 ? '#ffa000' : '#f44336';
                    return `<tr>
                        <td style="color:#888;font-size:10px">${d.gameHour != null ? 'Hr ' + d.gameHour : '—'}</td>
                        <td style="text-align:right">${fmtNum(d.deliveredQuantity || 0)}</td>
                        <td style="text-align:right">${fmt$(d.pricePerUnit || 0)}</td>
                        <td style="text-align:right;font-weight:500">${fmt$(d.totalValue || 0)}</td>
                        <td style="text-align:right;color:${frColor}">${fr}%</td>
                    </tr>`;
                }).join('');

                const histTable = history.length > 0
                    ? `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:6px">
                        <thead><tr style="color:#555;font-size:10px;text-transform:uppercase">
                            <th style="padding:3px 4px;text-align:left;border-bottom:1px solid #222">Time</th>
                            <th style="padding:3px 4px;text-align:right;border-bottom:1px solid #222">Qty</th>
                            <th style="padding:3px 4px;text-align:right;border-bottom:1px solid #222">Unit $</th>
                            <th style="padding:3px 4px;text-align:right;border-bottom:1px solid #222">Total</th>
                            <th style="padding:3px 4px;text-align:right;border-bottom:1px solid #222">Fulfill</th>
                        </tr></thead>
                        <tbody>${histRows}</tbody>
                    </table>`
                    : `<div style="font-size:11px;color:#555;margin-top:4px">No deliveries yet</div>`;

                const avgFulfill = c.averageFulfillmentRate != null
                    ? ((c.averageFulfillmentRate) * 100).toFixed(0) + '%'
                    : '—';
                const fulfillColor = (c.averageFulfillmentRate || 0) >= 0.9 ? '#4caf50'
                                   : (c.averageFulfillmentRate || 0) >= 0.5 ? '#ffa000' : '#f44336';

                return `<div style="background:#161616;border-radius:6px;padding:12px 14px;margin-bottom:10px;border:1px solid #2a2a2a">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
                        <div>
                            <span style="font-weight:600;font-size:13px;color:#ddd">${c.product || '—'}</span>
                            <span style="margin-left:8px;font-size:11px;color:#888">${c.productCategory || ''}</span>
                        </div>
                        <span style="font-size:10px;padding:2px 6px;border-radius:3px;background:${stBg};color:${stColor}">${st}</span>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;font-size:11px;margin-bottom:8px">
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Role</div>
                            <div>${role}</div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Counterparty</div>
                            <div style="color:#aaa">${counterparty}</div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Volume / Period</div>
                            <div style="color:#ddd">${fmtNum(c.volumePerPeriod || 0)} ${c.periodType || ''}</div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Price / Unit</div>
                            <div style="color:#ddd">${fmt$(c.pricePerUnit || 0)} <span style="color:#555">${c.priceType || ''}</span></div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Total Delivered</div>
                            <div style="color:#ddd">${fmtNum(c.totalDelivered || 0)}</div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Total Value</div>
                            <div style="color:#4caf50">${fmt$(c.totalValue || 0)}</div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Avg Fulfillment</div>
                            <div style="color:${fulfillColor};font-weight:600">${avgFulfill}</div>
                        </div>
                        <div>
                            <div style="color:#555;text-transform:uppercase;font-size:10px">Penalties</div>
                            <div style="color:${(c.totalPenalties || 0) > 0 ? '#f44336' : '#555'}">${fmt$(c.totalPenalties || 0)}</div>
                        </div>
                    </div>
                    <div style="font-size:10px;color:#444;margin-bottom:4px">RECENT DELIVERIES</div>
                    ${histTable}
                </div>`;
            }).join('');

            return `<div class="section">
                <div class="section-title">Contracts (${firmContracts.length})</div>
                ${cards}
            </div>`;
        }

        // ─── Main render ───────────────────────────────────────────────────────────

        function renderFirm(firm, allTransactions = [], allContracts = []) {
            if (!firm) {
                content.innerHTML = '<div class="loading error">Firm not found</div>';
                return;
            }

            document.title = (firm.displayName || firm.name || firm.id) + ' — EconSim';

            const monthlyProfit = firm.monthlyProfit || 0;
            const employees = firm.totalEmployees || firm.employees || 0;
            const corpStr = firm.corporationAbbreviation || '';

            content.innerHTML = `
                <div class="firm-hero">
                    <div class="firm-hero-top">
                        <div>
                            <div class="firm-hero-name">${firm.displayName || firm.name || firm.id}</div>
                            <div class="firm-hero-sub">
                                <span class="city">📍 ${firm.cityName || '—'}</span>
                                ${corpStr ? `<span class="corp">${corpStr}</span>` : ''}
                                <span style="margin-left:8px;color:#555;font-size:11px">ID: ${firm.id}</span>
                            </div>
                        </div>
                        <span class="type-badge">${typeName(firm)}</span>
                    </div>
                    <div class="kpi-row">
                        <div class="kpi-cell">
                            <div class="kpi-label">Cash</div>
                            <div class="kpi-value">${fmt$(firm.cash)}</div>
                        </div>
                        <div class="kpi-cell">
                            <div class="kpi-label">Mo. Revenue</div>
                            <div class="kpi-value">${fmt$(firm.monthlyRevenue || 0)}</div>
                        </div>
                        <div class="kpi-cell">
                            <div class="kpi-label">Mo. Expenses</div>
                            <div class="kpi-value">${fmt$(firm.monthlyExpenses || 0)}</div>
                        </div>
                        <div class="kpi-cell">
                            <div class="kpi-label">Mo. Profit</div>
                            <div class="kpi-value ${profitClass(monthlyProfit)}">${fmt$(monthlyProfit)}</div>
                        </div>
                        <div class="kpi-cell">
                            <div class="kpi-label">Employees</div>
                            <div class="kpi-value">${fmtNum(employees)}</div>
                        </div>
                    </div>
                </div>

                <div class="two-col">
                    ${renderFinancials(firm)}
                    ${renderLabor(firm)}
                </div>

                ${renderProductionHealth(firm)}
                ${renderTypeSection(firm)}
                ${renderLotProgress(firm)}
                ${renderLotInventory(firm)}
                ${renderLoans(firm)}
                ${renderHistory(firm)}
                ${renderContracts(firm, allContracts)}
                ${renderFirmTransactions(firm, allTransactions)}
            `;
        }

        // ─── State subscription ────────────────────────────────────────────────────

        stateManager.subscribeAll((state) => {
            if (state.firms && firmId) {
                const firm = state.firms[firmId];
                renderFirm(firm, state.recentTransactions || [], state.contracts || []);
            }
        });

        // ─── Init ──────────────────────────────────────────────────────────────────

        async function init() {
            if (!firmId) {
                content.innerHTML = '<div class="loading error">No firm ID provided. <a href="firms.html" style="color: #00d4ff;">Go to Firms</a></div>';
                return;
            }

            const sessionId = sessionStorage.getItem('activeSessionId');
            if (!sessionId) {
                content.innerHTML = '<div class="loading">No active session. <a href="index.html" style="color: #00d4ff;">Go to Dashboard</a></div>';
                return;
            }

            try {
                await wsClient.connect();
                setupGameControls(wsClient, stateManager);
                await fetch('/api/v1/games/' + sessionId + '/load', { method: 'POST' });
                await wsClient.joinSession(sessionId);
            } catch (e) {
                console.error('Error:', e);
                content.innerHTML = '<div class="loading error">Error connecting. <a href="index.html" style="color: #00d4ff;">Go to Dashboard</a></div>';
            }
        }

        init();
    </script>
</body>
</html>
